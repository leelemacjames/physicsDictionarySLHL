                const matchFilter = filter === "all" || (filter === "hl" ? t.hl : !t.hl);

                if (transitioning || filtered.length === 0) return;
                setTransitioning(true);
                setTimeout(() => {

                    setLevel(0);
                    setTransitioning(false);
                }, 180);
            }, [transitioning, filtered.length]);

                };

                return () => window.removeEventListener("keydown", h);
            }, [go, level]);

                                    {[1,2,3].map((n, i) => (
                                        <button key={n} onClick={() => setLevel(i)} style={{flex:1, padding:12, background: level === i ? `${LEVEL_COLORS[i]}20` : "transparent", color: level === i ? LEVEL_COLORS[i] : MUTED, border:"none", borderBottom: level === i ? `2px solid ${LEVEL_COLORS[i]}` : "2px solid transparent", cursor:"pointer", fontSize:"0.65rem", textTransform:"uppercase"}}>Level {n}</button>
                                    ))}
                                </div>
                                <div style={{padding:30, minHeight:160, display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center"}}>
                                    {level === 0 && (
                                        <div>
                                            <div style={{display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:20}}>{(card.keywords || []).map(k => <span key={k} style={{border:`1px solid ${GOLD}50`, color:GOLD, padding:"3px 10px", borderRadius:15, fontSize:"0.75rem"}}>{k}</span>)}</div>
                                            <div style={{display:"flex", gap:15, justifyContent:"center"}}><div style={{fontSize:"0.8rem"}}><span style={{color:MUTED}}>Syn:</span> {(card.synonyms || []).join(", ")}</div><div style={{fontSize:"0.8rem"}}><span style={{color:MUTED}}>Ant:</span> {(card.antonyms || []).join(", ")}</div></div>
                                        </div>
                                    )}
                                    {level === 1 && <div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:"1.4rem", fontStyle:"italic", color:WHITE}}>"{card.context}"</div>}
                                    {level === 2 && <div style={{fontSize:"0.95rem", lineHeight:1.7, textAlign:"left"}}>{card.full}</div>}
                                </div>
                                <div style={{padding:15, background:"#0f1016", borderTop:`1px solid ${BORDER}`, display:"flex", justifyContent:"space-between"}}>
                                    <button onClick={() => go(-1)} style={{background:"none", border:"none", color:MUTED, cursor:"pointer"}}>← Prev</button>
                                    <div style={{color:GOLD, fontSize:"0.8rem"}}>{idx + 1} / {filtered.length}</div>
                                    <button onClick={() => go(1)} style={{background:"none", border:"none", color:MUTED, cursor:"pointer"}}>Next →</button>
                                </div>
                            </div>
                        </div>
                    ) : <div style={{color:MUTED}}>No results.</div>}
                    
                    <div style={{marginTop:40, color:MUTED, fontSize:"0.6rem", letterSpacing:"0.1em", textTransform:"uppercase"}}>Constructed by Silicon · Architect Carbon · LeeMcCullochJames</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
